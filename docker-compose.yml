services:
  litellm-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: llmproxy
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD:-dbpassword9090}
    volumes:
      - litellm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d litellm -U llmproxy" ]
      interval: 5s
      timeout: 5s
      retries: 20

  cxdb:
    build:
      context: ./cxdb
      dockerfile: Dockerfile
    ports:
      - "9009:9009"
      - "9010:80"
      - "9011:3000"
    environment:
      CXDB_DATA_DIR: /data
    volumes:
      - ./data/cxdb:/data

  kilroy:
    build:
      context: .
      dockerfile: Dockerfile.kilroy
    depends_on:
      - cxdb
    environment:
      CXDB_BINARY_ADDR: cxdb:9009
      CXDB_HTTP_BASE_URL: http://cxdb:80
    volumes:
      - .:/workspace
      - ${KILROY_CODE_DIR:-./kilroy}:/workspace/code
      - ${KILROY_SPEC_FILE:-./kilroy/demo/solitaire/solitaire-fast.dot}:/workspace/spec/solitaire-fast.dot:ro
    working_dir: /workspace
    command: [ "sh", "-lc", "kilroy --help && sleep infinity" ]

  bedrock-proxy:
    image: ghcr.io/berriai/litellm:main-latest
    depends_on:
      litellm-db:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local-dev-master-key}
      DATABASE_URL: postgresql://llmproxy:${LITELLM_DB_PASSWORD:-dbpassword9090}@litellm-db:5432/litellm
      STORE_MODEL_IN_DB: "True"
      UI_USERNAME: ${LITELLM_UI_USERNAME:-admin}
      UI_PASSWORD: ${LITELLM_UI_PASSWORD:-changeme}
      AWS_PROFILE: ${AWS_PROFILE:-staging}
      AWS_REGION_NAME: ${AWS_REGION_NAME:-us-east-1}
    volumes:
      - ./bedrock/litellm.config.yaml:/app/config.yaml:ro
      - ${HOME}/.aws:/root/.aws:ro
    command: [ "--config", "/app/config.yaml" ]

volumes:
  litellm_postgres_data:
