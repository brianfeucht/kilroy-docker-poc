services:
  litellm-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: llmproxy
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD:-dbpassword9090}
    volumes:
      - litellm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d litellm -U llmproxy" ]
      interval: 5s
      timeout: 5s
      retries: 20

  cxdb:
    build:
      context: ./cxdb
      dockerfile: Dockerfile
    ports:
      - "9009:9009"
      - "9010:80"
      - "9011:3000"
    environment:
      CXDB_DATA_DIR: /data
    volumes:
      - ./data/cxdb:/data

  bedrock-proxy:
    image: ghcr.io/berriai/litellm:main-latest
    depends_on:
      litellm-db:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local-dev-master-key}
      DATABASE_URL: postgresql://llmproxy:${LITELLM_DB_PASSWORD:-dbpassword9090}@litellm-db:5432/litellm
      STORE_MODEL_IN_DB: "True"
      UI_USERNAME: ${LITELLM_UI_USERNAME:-admin}
      UI_PASSWORD: ${LITELLM_UI_PASSWORD:-changeme}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION_NAME: ${AWS_REGION_NAME:-us-east-1}
    volumes:
      - ./bedrock/litellm.config.yaml:/app/config.yaml:ro
    command: [ "--config", "/app/config.yaml" ]

volumes:
  litellm_postgres_data:
